<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./removedbg_gugugu.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gu Gu Gu: Campus Ecology</title>
    <!-- Google Fonts: Inter and Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
  </head>
  <body class="theme-light">
    <!-- Fixed Background for Mobile Compatibility -->
    <div class="fixed-bg"></div>

    <!-- App Container -->
    <div id="app"></div>

    <!-- Global Bird Detail Modal (Outside App to avoid transform conflicts) -->
    <div id="bird-modal" class="centered-modal-overlay hidden">
      <div class="centered-modal-content" id="bird-modal-content">
        <!-- Navigation -->
        <button id="prev-bird-btn" class="modal-nav-btn" style="left:12px;">&larr;</button>
        <button id="next-bird-btn" class="modal-nav-btn" style="right:12px;">&rarr;</button>

        <div class="modal-body-flex">
          <div class="modal-img-container">
            <img id="modal-img" src="" />
            <button id="close-modal" class="modal-close-btn">&times;</button>
          </div>
          <div class="modal-info-scroll">
             <h2 id="modal-name"></h2>
             <p id="modal-enName"></p>
             <div class="glass-panel" style="margin-bottom:2rem; padding:1.5rem; background:rgba(0,0,0,0.4);">
                <h3 style="font-size:0.9rem; color:#86efac; margin-bottom:1.2rem;" data-i18n="eco-data">📊 生態數據</h3>
                <div style="display:flex; flex-direction:column; gap:1.2rem;">
                   <div class="stat-row">
                      <span data-i18n="stat-size">體型</span>
                      <div class="stat-bar-bg"><div id="bar-size" class="stat-bar" style="background:var(--secondary-color)"></div></div>
                      <span id="label-size" class="stat-val"></span>
                   </div>
                   <div class="stat-row">
                      <span data-i18n="stat-rate">出沒機率</span>
                      <div class="stat-bar-bg"><div id="bar-prob" class="stat-bar" style="background:#86efac"></div></div>
                      <span id="label-prob" class="stat-val"></span>
                   </div>
                   <div class="stat-row">
                      <span data-i18n="stat-rarity">稀有度</span>
                      <div class="stat-bar-bg"><div id="bar-rare" class="stat-bar" style="background:#f87171"></div></div>
                      <span id="label-rare" class="stat-val"></span>
                   </div>
                </div>
             </div>
             <div style="margin-bottom:2rem;">
                <h3 style="font-size:1rem; color:#86efac; margin-bottom:0.8rem;" data-i18n="learn-more">🌿 深入了解</h3>
                <p id="modal-details" style="color:#e2e8f0; font-size:1.15rem; line-height:1.8;"></p>
             </div>
             <div style="margin-bottom:2rem; padding:1.2rem 1.5rem; border-radius:12px; background:rgba(134,239,172,0.05); border:1px solid rgba(134,239,172,0.2);">
                <h3 style="font-size:0.9rem; color:#86efac; margin-bottom:1rem;" data-i18n="similar-birds">🔍 你看到的可能也是...</h3>
                <div id="modal-similar-icons" style="display:flex; gap:12px; flex-wrap:wrap;"></div>
             </div>
             <div style="display:flex; gap:1rem; margin-top:1rem;">
                <button id="btn-play-audio" class="btn-primary" style="flex:1;" data-i18n="btn-voice">🎵 聆聽叫聲</button>
                <button id="btn-read-aloud" class="btn-secondary" style="flex:1;" data-i18n="btn-tts">🔊 語音朗讀</button>
             </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Global Translate System (Bottom Right) -->
    <div id="global-lang-btn" class="glass-panel">
      <span>EN</span>
    </div>

    <!-- Interactive Mascot Widget (Persistent, Bottom Left) -->
    <div id="mascot-widget" class="hidden">
      <div id="mascot-bubble" class="hidden">
        Gu Gu Gu!
      </div>
      <img src="./removedbg_gugugu.png" alt="Gu Gu Gu Mascot" id="mascot-img" />
    </div>

    <!-- Scripts -->
    <script type="module" src="./main.js"></script>
  </body>
</html>
